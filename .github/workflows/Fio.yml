name: Build fio Multi-Arch (QEMU)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        arch: [amd64, arm64, armv7]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Create output dir
        run: mkdir -p tools/fio

      - name: Build fio (static)
        run: |
          ARCH=${{ matrix.arch }}

          case "$ARCH" in
            amd64) TARGET="x86_64-linux-musl" ;;
            arm64) TARGET="aarch64-linux-musl" ;;
            armv7) TARGET="armv7l-linux-musleabihf" ;;
          esac

          docker run --rm --platform=linux/$ARCH \
            -v $PWD:/work \
            -w /work \
            alpine:3.19 sh -c "
              set -e

              apk add --no-cache \
                build-base \
                linux-headers \
                git \
                musl-dev

              git clone https://github.com/axboe/fio.git
              cd fio

              ./configure --disable-shared --enable-static
              make -j$(nproc)

              strip fio || true

              cp fio /work/tools/fio/fio-linux-$ARCH
            "

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: fio-binaries
          path: tools/fio/*
