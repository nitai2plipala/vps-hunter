name: Build fio Static Binaries (Zig)

on:
  workflow_dispatch:

jobs:
  # ─────────────────────────────────────────────
  # 1. 检查版本
  # ─────────────────────────────────────────────
  check-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get-version.outputs.version }}
      should-build: ${{ steps.check-version.outputs.should-build }}

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt update && sudo apt install -y jq gh curl

      - name: Get latest fio version
        id: get-version
        run: |
          VERSION=$(curl -s https://api.github.com/repos/axboe/fio/releases/latest | jq -r '.tag_name')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check existing release
        id: check-version
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION=${{ steps.get-version.outputs.version }}
          if gh release view "fio-${VERSION}" > /dev/null 2>&1; then
            echo "should-build=false" >> $GITHUB_OUTPUT
          else
            echo "should-build=true" >> $GITHUB_OUTPUT
          fi

  # ─────────────────────────────────────────────
  # 2. 编译（Zig）
  # ─────────────────────────────────────────────
  build:
    needs: check-release
    if: needs.check-release.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: x64
            target: x86_64-linux-musl
          - arch: x86
            target: i686-linux-musl
          - arch: aarch64
            target: aarch64-linux-musl
          - arch: arm
            target: arm-linux-musl   # ⚠️ 改为更稳定

    steps:
      - uses: actions/checkout@v4

      - name: Install deps
        run: sudo apt update && sudo apt install -y build-essential curl git

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.12.0/zig-linux-x86_64-0.12.0.tar.xz -o zig.tar.xz
          tar -xf zig.tar.xz
          mv zig-linux-x86_64-0.12.0 zig
          echo "$PWD/zig" >> $GITHUB_PATH

      - name: Build fio (${{ matrix.arch }})
        run: |
          set -e

          TARGET=${{ matrix.target }}
          ARCH=${{ matrix.arch }}

          git clone https://github.com/axboe/fio.git
          cd fio

          export CC="zig cc -target ${TARGET} -static"
          export CXX="zig c++ -target ${TARGET} -static"
          export AR="zig ar"
          export RANLIB="zig ranlib"
          export CFLAGS="-O2"
          export LDFLAGS="-static"

          ./configure --disable-native --build-static

          make -j2

          strip fio
          cp fio ../fio_${ARCH}

      - name: Verify
        run: |
          file fio_${{ matrix.arch }}
          file fio_${{ matrix.arch }} | grep -q "statically linked"

      - name: Upload
        uses: actions/upload-artifact@v4
        with:
          name: fio_${{ matrix.arch }}
          path: fio_${{ matrix.arch }}

  # ─────────────────────────────────────────────
  # 3. VirusTotal（保留你逻辑）
  # ─────────────────────────────────────────────
  virustotal:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Prepare
        run: |
          mkdir scan
          find artifacts -name "fio_*" -exec cp {} scan/ \;

      - name: Scan
        run: |
          for f in scan/*; do
            echo "Scanning $f"
            curl -s --request POST \
              --url https://www.virustotal.com/api/v3/files \
              --header "x-apikey: ${{ secrets.VIRUSTOTAL_API_KEY }}" \
              --form file=@$f > /dev/null
          done

  # ─────────────────────────────────────────────
  # 4. Release
  # ─────────────────────────────────────────────
  release:
    needs: [check-release, build]
    if: needs.check-release.outputs.should-build == 'true'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect
        run: |
          mkdir release
          find dist -name "fio_*" -exec cp {} release/ \;

      - name: Checksums
        run: |
          cd release
          sha256sum fio_* > checksums.txt

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: fio-${{ needs.check-release.outputs.version }}
          files: |
            release/fio_*
            release/checksums.txt
